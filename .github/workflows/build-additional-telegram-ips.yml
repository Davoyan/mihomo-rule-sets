name: Update additional telegram ips

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  update-additional-telegram-ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run updater
        run: |
          set -e
          python scripts/build-additional-telegram-ips.py --path domains/additional-telegram-ips.yaml

      - name: Commit and push changes
        run: |
          git config user.name "mihomo-rule-sets bot"
          git config user.email "noreply@github.com"

          git add domains/additional-telegram-ips.yaml

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update ru apps in remnawave template"
          git pull --rebase
          git push